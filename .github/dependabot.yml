version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    target-branch: "dev"
    assignees:
      - "ahmadashfq"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
