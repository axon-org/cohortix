name: Deploy to Staging

on:
  push:
    branches: [dev]

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true # OK to cancel staging deploys for newer pushes

permissions:
  contents: read
  issues: write
  deployments: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # QUICK CHECKS
  # Fast gate before spending Vercel build minutes
  # ═══════════════════════════════════════════════════════════════
  pre-deploy-checks:
    name: Pre-Deploy Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

  # ═══════════════════════════════════════════════════════════════
  # BUILD & DEPLOY TO STAGING
  # ═══════════════════════════════════════════════════════════════
  deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: pre-deploy-checks
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    environment:
      name: staging
      url: https://staging.cohortix.ai
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-staging-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-staging-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=staging --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build staging artifacts
        run: vercel build --target=staging --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NODE_ENV: production
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}

      - name: Deploy to Vercel staging
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --target=staging --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment-url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "🚀 Staging deployed to: $DEPLOYMENT_URL"

  # ═══════════════════════════════════════════════════════════════
  # SMOKE TEST
  # Basic health check on staging after deploy
  # ═══════════════════════════════════════════════════════════════
  smoke-test-staging:
    name: Smoke Test Staging
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy-staging
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 15

      - name: Health check
        run: |
          STAGING_URL="https://staging.cohortix.ai"
          echo "Testing: $STAGING_URL/api/health"

          for i in {1..5}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
              -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" \
              "$STAGING_URL/api/health" || echo "000")

            if [[ "$STATUS" == "200" ]]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done

          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: Summary
        if: always()
        env:
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "## Staging Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`dev\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`$COMMIT_SHA\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://staging.cohortix.ai" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by:** $ACTOR" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════
  # POST-DEPLOY HEALTH CHECK
  # ═══════════════════════════════════════════════════════════════
  post-deploy-health-check:
    name: Post-Deploy Health Check
    needs: [deploy-staging, smoke-test-staging]
    uses: ./.github/workflows/health-check.yml
    with:
      target_url: https://staging.cohortix.ai
    secrets: inherit
