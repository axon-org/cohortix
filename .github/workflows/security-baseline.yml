name: Security Baseline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # GITLEAKS SECRETS SCAN
  # Scans the full git history for accidental secret commits using
  # Gitleaks. Blocks merge if any verified leak is detected.
  # ═══════════════════════════════════════════════════════════════

  gitleaks-secrets-scan:
    name: Gitleaks Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ═══════════════════════════════════════════════════════════════
  # DEPENDENCY AUDIT — HIGH SEVERITY
  # Fails the build if any dependency has a HIGH or CRITICAL
  # vulnerability. Stricter than the moderate-level audit in CI.
  # ═══════════════════════════════════════════════════════════════

  dependency-audit-high:
    name: Dependency Audit (High)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit for high-severity vulnerabilities
        id: audit
        run: |
          set +e
          # Attempt pnpm audit with retries for network/registry issues
          MAX_RETRIES=3
          RETRY_COUNT=0
          AUDIT_EXIT_CODE=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Running pnpm audit (Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES)..."
            pnpm audit --audit-level=high --json > audit-results.json
            AUDIT_EXIT_CODE=$?
            
            # Exit codes: 0 = no vulnerabilities, 1 = vulnerabilities found
            # If it's a 500/network error, pnpm usually exits with a non-zero code but empty/invalid json
            # or we can check the output for registry error messages.
            
            if [ $AUDIT_EXIT_CODE -eq 0 ]; then
              echo "✅ No high-severity vulnerabilities found."
              break
            elif [ $AUDIT_EXIT_CODE -eq 1 ]; then
              # Check if it's actually a vulnerability report or a registry error
              # A valid JSON with "vulnerabilities" or "metadata" indicates a successful audit even if vulns exist.
              if grep -q "vulnerabilities" audit-results.json || grep -q "metadata" audit-results.json; then
                echo "❌ High-severity vulnerabilities detected."
                break
              else
                echo "⚠️ Registry error or invalid response. Retrying in 10s..."
                RETRY_COUNT=$((RETRY_COUNT + 1))
                sleep 10
              fi
            else
              echo "⚠️ Audit command failed with exit code $AUDIT_EXIT_CODE. Retrying in 10s..."
              RETRY_COUNT=$((RETRY_COUNT + 1))
              sleep 10
            fi
          done

          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "::warning title=Audit Registry Error::pnpm audit failed after $MAX_RETRIES attempts due to registry/network errors. Soft-failing to avoid blocking CI."
            echo "AUDIT_STATUS=soft-fail" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ $AUDIT_EXIT_CODE -eq 1 ]; then
             echo "AUDIT_STATUS=vulnerabilities-found" >> "$GITHUB_OUTPUT"
             # Pretty print results for the logs
             cat audit-results.json | npx pnpm-audit-summary || true
             exit 1
          fi

          echo "AUDIT_STATUS=success" >> "$GITHUB_OUTPUT"

      - name: Generate audit report
        if: always()
        run: |
          echo "## Dependency Audit Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          STATUS="${{ steps.audit.outputs.AUDIT_STATUS }}"
          
          if [ "$STATUS" = "success" ]; then
            echo "✅ No high-severity vulnerabilities detected." >> "$GITHUB_STEP_SUMMARY"
          elif [ "$STATUS" = "vulnerabilities-found" ]; then
            echo "❌ **High or critical severity vulnerabilities were detected.**" >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`pnpm audit --audit-level=high\` locally to review and remediate." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "See the job logs for the full report." >> "$GITHUB_STEP_SUMMARY"
          elif [ "$STATUS" = "soft-fail" ]; then
            echo "⚠️ **Audit service unavailable.**" >> "$GITHUB_STEP_SUMMARY"
            echo "The npm audit registry returned errors or timed out after multiple retries." >> "$GITHUB_STEP_SUMMARY"
            echo "This check was soft-failed to avoid blocking the pipeline, but you should run \`pnpm audit\` locally to ensure security." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ═══════════════════════════════════════════════════════════════
  # STATUS CHECK
  # Succeeds only when all security baseline checks pass.
  # ═══════════════════════════════════════════════════════════════

  security-baseline-success:
    name: Security Baseline Success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - gitleaks-secrets-scan
      - dependency-audit-high
    steps:
      - name: Check all security jobs
        run: |
          if [[ "${{ needs.gitleaks-secrets-scan.result }}" != "success" ]] || \
             [[ "${{ needs.dependency-audit-high.result }}" != "success" ]]; then
            echo "One or more security baseline checks failed."
            exit 1
          fi
          echo "✅  All security baseline checks passed."
