name: Deploy

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: write
  checks: read
  deployments: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # VALIDATE: Lint, type-check, and test before deploying
  # ═══════════════════════════════════════════════════════════════
  validate:
    name: Validate
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Unit tests
        run: pnpm test:unit

  # ═══════════════════════════════════════════════════════════════
  # DEPLOY: Build and deploy via Vercel CLI
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [validate]
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Determine environment
        id: env
        env:
          GIT_REF: ${{ github.ref }}
          INPUT_ENV: ${{ inputs.environment }}
        run: |
          if [[ "$GIT_REF" == "refs/heads/main" ]] || [[ "$INPUT_ENV" == "production" ]]; then
            echo "target=production" >> "$GITHUB_OUTPUT"
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "🚀 Deploying to PRODUCTION (app.cohortix.ai)"
          else
            echo "target=staging" >> "$GITHUB_OUTPUT"
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "🔄 Deploying to STAGING (staging.cohortix.ai)"
          fi

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=${{ steps.env.outputs.target }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull environment variables
        run: |
          vercel env pull .env.local --environment=${{ steps.env.outputs.target }} --token=${{ secrets.VERCEL_TOKEN }}
          cp .env.local apps/web/.env.local

      - name: Build project
        run: |
          if [[ "${{ steps.env.outputs.target }}" == "production" ]]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [[ "${{ steps.env.outputs.target }}" == "production" ]]; then
            URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed to: $URL"

      - name: Assign staging domain
        if: steps.env.outputs.target == 'staging'
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: vercel alias "$DEPLOY_URL" staging.cohortix.ai --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}

      - name: Comment deployment URL on commit
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ steps.env.outputs.environment }}';
            const url = '${{ steps.deploy.outputs.url }}';
            const emoji = env === 'production' ? '🚀' : '🔄';
            const domain = env === 'production' ? 'app.cohortix.ai' : 'staging.cohortix.ai';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${emoji} **Deployed to ${env}**\n\n🔗 https://${domain}\n📎 ${url}\n\n_Deployed via GitHub Actions_`
            });
