name: Preview Deployment

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # PREVIEW DEPLOYMENT
  # Deploy to Vercel preview environment for PR testing
  # ═══════════════════════════════════════════════════════════════

  deploy-preview:
    name: Deploy Preview
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          # Add build-time environment variables
          NEXT_PUBLIC_APP_URL: preview
          # Supabase Branching DB URL injection
          DATABASE_URL: ${{ secrets.SUPABASE_BRANCH_DB_URL || secrets.PREVIEW_DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOYMENT_URL"

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview-url }}';
            const comment = `## 🚀 Preview Deployment Ready!

            Your changes have been deployed to Vercel:

            🔗 **Preview URL:** ${previewUrl}

            ### Next Steps
            - [ ] Manual testing completed
            - [ ] E2E tests passing (see below)
            - [ ] No visual regressions

            ---
            <sub>Deployed from commit \`${context.sha.substring(0, 7)}\`</sub>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ═══════════════════════════════════════════════════════════════
  # E2E TESTS AGAINST PREVIEW
  # Run Playwright tests against the deployed preview URL
  # ═══════════════════════════════════════════════════════════════

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: deploy-preview
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Wait for deployment to be ready
        run: |
          PREVIEW_URL="${{ needs.deploy-preview.outputs.preview-url }}"
          echo "Waiting for $PREVIEW_URL to be ready..."

          for i in {1..30}; do
            if curl -f -s -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" "$PREVIEW_URL" > /dev/null; then
              echo "Preview is ready!"
              exit 0
            fi
            echo "Attempt $i/30 failed, retrying in 10s..."
            sleep 10
          done

          echo "Preview failed to become ready"
          exit 1

      - name: Run Playwright E2E tests
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ needs.deploy-preview.outputs.preview-url }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_BYPASS_SECRET: ${{ secrets.E2E_BYPASS_SECRET }}
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: test-results/
          retention-days: 7

      - name: Comment test results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testStatus = '${{ job.status }}' === 'success' ? '✅ PASSED' : '❌ FAILED';
            const icon = '${{ job.status }}' === 'success' ? '✅' : '❌';

            let comment = `## ${icon} E2E Test Results

            **Status:** ${testStatus}
            **Preview URL:** ${{ needs.deploy-preview.outputs.preview-url }}

            `;

            if ('${{ job.status }}' !== 'success') {
              comment += `### 🔍 Debug Information
              - Test videos and reports are available in the workflow artifacts
              - Review the Playwright report for detailed failure information
              
              [View Full Playwright Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
              `;
            }

            comment += `\n---\n<sub>Tests run at ${new Date().toISOString()}</sub>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ═══════════════════════════════════════════════════════════════
  # VISUAL REGRESSION (Optional - uncomment when ready)
  # Compare screenshots with baseline images
  # ═══════════════════════════════════════════════════════════════

  # visual-regression:
  #   name: Visual Regression
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 15
  #   needs: deploy-preview
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #
  #     - name: Setup pnpm
  #       uses: pnpm/action-setup@v3
  #       with:
  #         version: ${{ env.PNPM_VERSION }}
  #
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: ${{ env.NODE_VERSION }}
  #         cache: 'pnpm'
  #
  #     - name: Install dependencies
  #       run: pnpm install --frozen-lockfile
  #
  #     - name: Run visual regression tests
  #       run: pnpm test:visual
  #       env:
  #         BASE_URL: ${{ needs.deploy-preview.outputs.preview-url }}
  #
  #     - name: Upload visual diff report
  #       if: failure()
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: visual-regression-report
  #         path: visual-regression-report/
  #         retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # PREVIEW SUCCESS
  # Meta job for required status checks
  # ═══════════════════════════════════════════════════════════════

  preview-success:
    name: Preview Success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - deploy-preview
      - e2e-tests
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.deploy-preview.result }}" != "success" ]] || \
             [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "Preview deployment or E2E tests failed"
            exit 1
          fi
          echo "Preview deployment successful!"
