name: Post-Merge Cleanup

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - dev

jobs:
  cleanup:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync dev after main merge
        if: github.base_ref == 'main' && github.head_ref == 'dev'
        run: |
          echo "🔄 dev was merged to main. Syncing dev with main..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout dev
          git pull origin main --ff-only
          git push origin dev
          
          echo "✅ dev synced with main"

      - name: Delete merged feature branch
        if: github.base_ref == 'dev' && (startsWith(github.head_ref, 'feat/') || startsWith(github.head_ref, 'fix/'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "🗑️ Deleting merged branch: $BRANCH"
          
          # Delete remote branch
          git push origin --delete "$BRANCH" || echo "Branch already deleted remotely"
          
          echo "✅ Branch $BRANCH deleted"

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const baseRef = context.payload.pull_request.base.ref;
            const headRef = context.payload.pull_request.head.ref;
            let comment = '## 🤖 Post-Merge Automation\n\n';
            
            if (baseRef === 'main' && headRef === 'dev') {
              comment += '✅ `dev` synced with `main`\n';
            } else if (baseRef === 'dev' && (headRef.startsWith('feat/') || headRef.startsWith('fix/'))) {
              comment += `✅ Branch \`${headRef}\` deleted after merge\n`;
            }
            
            comment += '\n_Automated by Post-Merge Cleanup workflow_';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
