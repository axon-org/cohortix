name: Post-Deploy Health Check

on:
  workflow_call:
    inputs:
      target_url:
        description: 'Base URL to check'
        required: false
        type: string
        default: 'https://app.cohortix.ai'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Base URL to check'
        required: false
        default: 'https://app.cohortix.ai'

concurrency:
  group: health-check-${{ inputs.target_url || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: Run Health Checks
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Run health checks
        id: run-checks
        run: |
          set -e

          RESULTS_FILE="health-check-results.txt"
          TARGET_URL="${{ inputs.target_url || 'https://app.cohortix.ai' }}"

          echo "# Post-Deploy Health Check" > "$RESULTS_FILE"
          echo "Target URL: $TARGET_URL" >> "$RESULTS_FILE"
          echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> "$RESULTS_FILE"
          echo "" >> "$RESULTS_FILE"

          HEADER_ARGS=()
          if [[ -n "${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" ]]; then
            HEADER_ARGS=(-H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}")
          fi

          FAIL=0

          check_status() {
            local url="$1"
            local expected="$2"
            local label="$3"
            local status
            status=$(curl -o /dev/null -s -w "%{http_code}" "${HEADER_ARGS[@]}" "$url" || echo "000")
            if [[ "$status" == "$expected" ]]; then
              echo "✅ $label → HTTP $status" | tee -a "$RESULTS_FILE"
            else
              echo "❌ $label → HTTP $status (expected $expected)" | tee -a "$RESULTS_FILE"
              FAIL=1
            fi
          }

          # API readiness (prefer /api/ready, fallback to /api/health)
          READY_STATUS=$(curl -o /dev/null -s -w "%{http_code}" "${HEADER_ARGS[@]}" "$TARGET_URL/api/ready" || echo "000")
          if [[ "$READY_STATUS" == "200" ]]; then
            echo "✅ API Ready → HTTP 200" | tee -a "$RESULTS_FILE"
          else
            HEALTH_STATUS=$(curl -o /dev/null -s -w "%{http_code}" "${HEADER_ARGS[@]}" "$TARGET_URL/api/health" || echo "000")
            if [[ "$HEALTH_STATUS" == "200" ]]; then
              echo "✅ API Health → HTTP 200" | tee -a "$RESULTS_FILE"
            else
              echo "❌ API Ready/Health failed → /api/ready=$READY_STATUS, /api/health=$HEALTH_STATUS" | tee -a "$RESULTS_FILE"
              FAIL=1
            fi
          fi

          check_status "$TARGET_URL/sign-in" "200" "Sign-in page"
          check_status "$TARGET_URL/dashboard" "307" "Dashboard redirect"

          # Clerk FAPI
          check_status "https://clerk.cohortix.ai/v1/environment" "200" "Clerk environment"

          # Supabase connectivity
          if [[ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" || -z "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]]; then
            echo "❌ Supabase secrets missing (NEXT_PUBLIC_SUPABASE_URL / NEXT_PUBLIC_SUPABASE_ANON_KEY)" | tee -a "$RESULTS_FILE"
            FAIL=1
          else
            SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
            SUPABASE_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              "$SUPABASE_URL/rest/v1/?select=1" || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "✅ Supabase API → HTTP 200" | tee -a "$RESULTS_FILE"
            else
              echo "❌ Supabase API → HTTP $STATUS (expected 200)" | tee -a "$RESULTS_FILE"
              FAIL=1
            fi
          fi

          if [[ "$FAIL" -eq 1 ]]; then
            echo "failed=true" >> $GITHUB_OUTPUT
            echo "" >> "$RESULTS_FILE"
            echo "❌ One or more health checks failed." >> "$RESULTS_FILE"
            exit 1
          fi

          echo "failed=false" >> $GITHUB_OUTPUT
          echo "✅ All health checks passed." >> "$RESULTS_FILE"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('health-check-results.txt', 'utf8');
            const title = `Post-Deploy Health Check Failed (${new Date().toISOString().slice(0,10)})`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `## ❌ Post-Deploy Health Check Failed\n\n\n**Run:** ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}\n\n\n### Details\n\n\`\`\`\n${report}\n\`\`\`\n`
            });
