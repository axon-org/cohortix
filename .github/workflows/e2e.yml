name: E2E Tests

on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Optional base URL override"
        required: false

permissions:
  contents: read
  deployments: read

concurrency:
  group: e2e-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  e2e:
    name: Run Playwright E2E
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm -C apps/web exec playwright install --with-deps chromium

      - name: Resolve base URL
        id: base-url
        env:
          INPUT_BASE_URL: ${{ github.event.inputs.base_url }}
        run: |
          # Use manual override if provided, otherwise staging
          BASE_URL="${INPUT_BASE_URL:-https://staging.cohortix.ai}"
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "🔗 E2E target: $BASE_URL"

      - name: Run Playwright E2E tests
        run: pnpm -C apps/web test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ steps.base-url.outputs.base_url }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_BYPASS_SECRET: ${{ secrets.E2E_BYPASS_SECRET }}
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results/
          retention-days: 7
