name: E2E Tests

on:
  # Run after Preview or Deploy workflows complete
  workflow_run:
    workflows: ['Preview Deployment', 'Deploy']
    types: [completed]
  # Manual trigger with custom URL
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against'
        required: false

permissions:
  contents: read
  actions: read

concurrency:
  group: e2e-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  e2e:
    name: Run Playwright E2E
    runs-on: self-hosted
    timeout-minutes: 30
    # Only run if the triggering workflow succeeded (or manual dispatch)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Safe: use the workflow's SHA (target repo) to avoid checking out untrusted PR code
          ref: ${{ github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm -C apps/web exec playwright install --with-deps chromium

      - name: Resolve base URL
        id: base-url
        env:
          INPUT_BASE_URL: ${{ github.event.inputs.base_url }}
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name }}
          TRIGGER_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [[ -n "$INPUT_BASE_URL" ]]; then
            BASE_URL="$INPUT_BASE_URL"
            echo "📌 Manual override: $BASE_URL"

          elif [[ "$TRIGGER_BRANCH" == "main" ]]; then
            BASE_URL="https://app.cohortix.ai"
            echo "🚀 Production (main): $BASE_URL"

          elif [[ "$TRIGGER_BRANCH" == "dev" ]]; then
            BASE_URL="https://staging.cohortix.ai"
            echo "🔄 Staging (dev): $BASE_URL"

          else
            # PR branches — use staging as base (preview URLs are ephemeral)
            BASE_URL="https://staging.cohortix.ai"
            echo "🔍 PR/other branch — using staging: $BASE_URL"
          fi

          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Run Playwright E2E tests
        run: pnpm -C apps/web test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ steps.base-url.outputs.base_url }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_BYPASS_SECRET: ${{ secrets.E2E_BYPASS_SECRET }}
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-test-results
          path: apps/web/test-results/
          retention-days: 7
