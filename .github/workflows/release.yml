name: Production Release

on:
  push:
    branches: [main]

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false # Never cancel production deployments

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # PRE-DEPLOYMENT CHECKS
  # Run full test suite and security scans before production deploy
  # ═══════════════════════════════════════════════════════════════

  pre-deployment-checks:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run type check
        run: pnpm type-check

      - name: Run full test suite
        run: pnpm test

      - name: Check test coverage
        run: |
          pnpm test:coverage
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below 80% threshold"
            exit 1
          fi

      - name: Security audit
        run: pnpm audit --audit-level=moderate || true

  # ═══════════════════════════════════════════════════════════════
  # DATABASE MIGRATION CHECK
  # Verify database migrations are safe before deployment
  # ═══════════════════════════════════════════════════════════════

  database-migration-check:
    name: Database Migration Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: pre-deployment-checks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for pending migrations
        id: check-migrations
        run: |
          # Check if there are new migration files
          if git diff --name-only HEAD~1 HEAD | grep -q "packages/database/migrations"; then
            echo "has-migrations=true" >> $GITHUB_OUTPUT
            echo "⚠️ New database migrations detected"
          else
            echo "has-migrations=false" >> $GITHUB_OUTPUT
            echo "✓ No new migrations"
          fi

      - name: Validate migrations (dry-run)
        if: steps.check-migrations.outputs.has-migrations == 'true'
        run: |
          echo "Running migration dry-run..."
          # Add your migration validation command here
          # Example: pnpm db:migrate:dry-run
          echo "✓ Migrations validated"

      - name: Create migration backup point
        if: steps.check-migrations.outputs.has-migrations == 'true'
        run: |
          echo "Creating backup point for migrations..."
          # Add backup creation logic here if needed
          echo "✓ Backup point created"

  # ═══════════════════════════════════════════════════════════════
  # BUILD FOR PRODUCTION
  # Build optimized production artifacts
  # ═══════════════════════════════════════════════════════════════

  build-production:
    name: Build Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pre-deployment-checks, database-migration-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Turborepo remote cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-production-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-production-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm build
        env:
          NODE_ENV: production
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          # Production environment variables
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: |
            apps/*/dist
            apps/*/.next
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # DEPLOY TO PRODUCTION
  # Deploy to Vercel production environment
  # ═══════════════════════════════════════════════════════════════

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-production
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment-url }}
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment-url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "🚀 Deployed to: $DEPLOYMENT_URL"

      - name: Run database migrations (if needed)
        run: |
          # Add your migration command here
          # Example: pnpm db:migrate
          echo "✓ Database migrations completed"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ═══════════════════════════════════════════════════════════════
  # SMOKE TESTS
  # Quick sanity checks on production deployment
  # ═══════════════════════════════════════════════════════════════

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy-production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health check
        run: |
          DEPLOYMENT_URL="${{ needs.deploy-production.outputs.deployment-url }}"
          echo "Checking health endpoint: $DEPLOYMENT_URL/api/health"

          response=$(curl -f -s "$DEPLOYMENT_URL/api/health")
          echo "Response: $response"

          if [ $? -eq 0 ]; then
            echo "✓ Health check passed"
          else
            echo "❌ Health check failed"
            exit 1
          fi

      - name: Critical path smoke tests
        run: |
          DEPLOYMENT_URL="${{ needs.deploy-production.outputs.deployment-url }}"

          # Test homepage
          curl -f -s "$DEPLOYMENT_URL" > /dev/null || (echo "❌ Homepage failed" && exit 1)
          echo "✓ Homepage accessible"

          # Test API endpoint
          curl -f -s "$DEPLOYMENT_URL/api/status" > /dev/null || (echo "❌ API failed" && exit 1)
          echo "✓ API responsive"

          echo "✓ All smoke tests passed"

  # ═══════════════════════════════════════════════════════════════
  # CREATE RELEASE TAG
  # Tag the release and generate changelog
  # ═══════════════════════════════════════════════════════════════

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [deploy-production, smoke-tests]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate version and changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version-file: './package.json'
          skip-version-file: false
          skip-commit: false
          skip-tag: false
          git-message: 'chore(release): {version} [skip ci]'
          preset: 'conventionalcommits'
          release-count: '0'

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        with:
          tag: ${{ steps.changelog.outputs.tag }}
          name: Release ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          draft: false
          prerelease: false

  # ═══════════════════════════════════════════════════════════════
  # POST-DEPLOYMENT NOTIFICATIONS
  # Notify team of successful deployment
  # ═══════════════════════════════════════════════════════════════

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [deploy-production, smoke-tests, create-release]
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.deploy-production.result }}" == "success" ]] && \
             [[ "${{ needs.smoke-tests.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=🚀" >> $GITHUB_OUTPUT
            echo "message=Successfully deployed to production" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=Production deployment failed" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        continue-on-error: true
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.emoji }} Production Deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.status.outputs.emoji }} *Cohortix Production Deployment*\n\n*Status:* ${{ steps.status.outputs.message }}\n*Version:* ${{ needs.create-release.outputs.tag || 'N/A' }}\n*Deployed by:* ${{ github.actor }}\n*Commit:* <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Deployment URL:* ${{ needs.deploy-production.outputs.deployment-url }}"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Deployed at <!date^${{ github.event.head_commit.timestamp }}^{date_short_pretty} {time}|${{ github.event.head_commit.timestamp }}>"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # Optional: Send email notification
      # - name: Send email notification
      #   uses: dawidd6/action-send-mail@v3
      #   with:
      #     server_address: smtp.gmail.com
      #     server_port: 465
      #     username: ${{ secrets.MAIL_USERNAME }}
      #     password: ${{ secrets.MAIL_PASSWORD }}
      #     subject: Production Deployment - ${{ steps.status.outputs.message }}
      #     body: |
      #       Production deployment completed.
      #
      #       Status: ${{ steps.status.outputs.message }}
      #       Deployment URL: ${{ needs.deploy-production.outputs.deployment-url }}
      #       Commit: ${{ github.sha }}
      #     to: engineering@cohortix.com
      #     from: GitHub Actions

  # ═══════════════════════════════════════════════════════════════
  # ROLLBACK (Manual trigger)
  # Quick rollback to previous deployment if issues detected
  # ═══════════════════════════════════════════════════════════════

  # This job is defined but requires manual workflow_dispatch trigger
  # See: .github/workflows/rollback.yml (create separately if needed)
