<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; font-family: 'Inter', sans-serif; }

.logo { display: inline-flex; align-items: center; justify-content: center; position: relative; }

.text {
  font-weight: 600;
  font-size: 64px;
  letter-spacing: -0.035em;
  position: relative;
}

.o-wrap { position: relative; display: inline-block; }
.o-wrap svg.arc {
  position: absolute; bottom: 0px; left: 50%; transform: translateX(-50%);
  width: 32px; height: 10px;
}
.o-wrap svg.arc path { stroke: #5E6AD2; stroke-width: 2.5; stroke-linecap: round; fill: none; }

.favicon { display: inline-flex; align-items: center; justify-content: center; position: relative; width: 256px; height: 256px; }
.favicon .letter { font-weight: 600; font-size: 180px; letter-spacing: -0.03em; position: relative; top: -4px; }
.favicon svg.arc-lg { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); width: 72px; height: 20px; }
.favicon svg.arc-lg path { stroke: #5E6AD2; stroke-width: 4.5; stroke-linecap: round; fill: none; }

.wrap { padding: 0; }
</style>
</head>
<body>
<div class="wrap">
  <!-- White text wordmark (for dark backgrounds) -->
  <div class="logo" id="wordmark-white" style="padding: 40px 60px;">
    <span class="text" style="color: #FAFAFA;">Coh<span class="o-wrap">o<svg class="arc" viewBox="0 0 32 10"><path d="M 2 2 Q 16 10 30 2"/></svg></span>rtix</span>
  </div>
  <br><br>
  <!-- Dark text wordmark (for light backgrounds) -->
  <div class="logo" id="wordmark-dark" style="padding: 40px 60px;">
    <span class="text" style="color: #0A0A0B;">Coh<span class="o-wrap">o<svg class="arc" viewBox="0 0 32 10"><path d="M 2 2 Q 16 10 30 2"/></svg></span>rtix</span>
  </div>
  <br><br>
  <!-- Favicon white (for dark bg) -->
  <div class="favicon" id="favicon-white">
    <span class="letter" style="color: #FAFAFA;">C</span>
    <svg class="arc-lg" viewBox="0 0 72 20"><path d="M 4 4 Q 36 20 68 4"/></svg>
  </div>
  <br><br>
  <!-- Favicon dark (for light bg) -->
  <div class="favicon" id="favicon-dark">
    <span class="letter" style="color: #0A0A0B;">C</span>
    <svg class="arc-lg" viewBox="0 0 72 20"><path d="M 4 4 Q 36 20 68 4"/></svg>
  </div>
</div>
</body>
</html>
