<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; font-family: 'Inter', sans-serif; }

.logo-container {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* === WORDMARK DARK === */
#wordmark-dark {
  width: 800px;
  height: 200px;
  background: #0A0A0B;
}

#wordmark-dark .text {
  font-weight: 600;
  font-size: 64px;
  letter-spacing: -0.035em;
  color: #FAFAFA;
  position: relative;
}

/* === WORDMARK LIGHT === */
#wordmark-light {
  width: 800px;
  height: 200px;
  background: #FAFAFA;
}

#wordmark-light .text {
  font-weight: 600;
  font-size: 64px;
  letter-spacing: -0.035em;
  color: #0A0A0B;
  position: relative;
}

/* O with arc */
.o-wrap {
  position: relative;
  display: inline-block;
}

.o-wrap svg.arc {
  position: absolute;
  bottom: 0px;
  left: 50%;
  transform: translateX(-50%);
  width: 32px;
  height: 10px;
}

.o-wrap svg.arc path {
  stroke: #5E6AD2;
  stroke-width: 2.5;
  stroke-linecap: round;
  fill: none;
}

/* === FAVICON DARK === */
#favicon-dark {
  width: 256px;
  height: 256px;
  background: #0A0A0B;
  border-radius: 56px;
}

#favicon-dark .letter {
  font-weight: 600;
  font-size: 128px;
  letter-spacing: -0.03em;
  color: #FAFAFA;
  position: relative;
  top: -4px;
}

#favicon-dark svg.arc-lg {
  position: absolute;
  bottom: 44px;
  left: 50%;
  transform: translateX(-50%);
  width: 56px;
  height: 16px;
}

#favicon-dark svg.arc-lg path {
  stroke: #5E6AD2;
  stroke-width: 3.5;
  stroke-linecap: round;
  fill: none;
}

/* === FAVICON LIGHT === */
#favicon-light {
  width: 256px;
  height: 256px;
  background: #FAFAFA;
  border-radius: 56px;
  border: 1px solid #E5E5E5;
}

#favicon-light .letter {
  font-weight: 600;
  font-size: 128px;
  letter-spacing: -0.03em;
  color: #0A0A0B;
  position: relative;
  top: -4px;
}

#favicon-light svg.arc-lg {
  position: absolute;
  bottom: 44px;
  left: 50%;
  transform: translateX(-50%);
  width: 56px;
  height: 16px;
}

#favicon-light svg.arc-lg path {
  stroke: #5E6AD2;
  stroke-width: 3.5;
  stroke-linecap: round;
  fill: none;
}

.wrap { padding: 32px; display: flex; flex-direction: column; gap: 32px; align-items: flex-start; }
.row { display: flex; gap: 24px; align-items: center; }
.label { font-size: 13px; color: #888; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="label">Wordmark — Dark</div>
    <div class="logo-container" id="wordmark-dark">
      <span class="text">Coh<span class="o-wrap">o<svg class="arc" viewBox="0 0 32 10"><path d="M 2 2 Q 16 10 30 2"/></svg></span>rtix</span>
    </div>
  </div>

  <div>
    <div class="label">Wordmark — Light</div>
    <div class="logo-container" id="wordmark-light">
      <span class="text">Coh<span class="o-wrap">o<svg class="arc" viewBox="0 0 32 10"><path d="M 2 2 Q 16 10 30 2"/></svg></span>rtix</span>
    </div>
  </div>

  <div>
    <div class="label">Favicon / App Icon</div>
    <div class="row">
      <div class="logo-container" id="favicon-dark">
        <span class="letter">C</span>
        <svg class="arc-lg" viewBox="0 0 56 16"><path d="M 3 3 Q 28 16 53 3"/></svg>
      </div>
      <div class="logo-container" id="favicon-light">
        <span class="letter">C</span>
        <svg class="arc-lg" viewBox="0 0 56 16"><path d="M 3 3 Q 28 16 53 3"/></svg>
      </div>
    </div>
  </div>
</div>
</body>
</html>
